<!--
网页基本结构：
    HTML确定了网页的基本结构和内容，
    CSS负责网页的样式和布局，
    JavaScript实现网页的交互功能。
-->

<!DOCTYPE html><!-- 声明这是HTML5文档 -->

<!--<...>开始，</...>结束-->

<html><!-- HTML文档的根元素 -->

    <head><!-- 网页的头部内容 -->
        <title>网页标题</title>
        <h1>这是一个标题</h1><!-- 一级标题 -->
        <h6>这是一个六级标题</h6><!-- 六级标题 -->
    </head>

    <body><!-- 网页的主体内容 -->

        <!--文本元素-->
        <p><b>这是一个段落。</b></p><!--<b>加粗-->
        <p><i>这是另一个段落。</i></p><!--<i>斜体-->
        <p><u>这是第三个段落。</u></p><!--<u>下划线-->
        <p>这是第四个段落。<br></p><!--<br>换行-->

        <!--链接和图片元素-->
        <a href="https://www.example.com" target="_blank">这是一个链接</a><!-- 超链接 -->
        <img src="image.jpg" alt="这是一个图片"> <!-- 图片元素（链接或路径） -->
        
        <!-- 容器元素 -->
        <div style="background-color: red;"><!--CSS语句-->
            <p>这是一个块级元素。</p><!-- 块级元素 -->
            <p>可以有很多行</p>
        </div>
        <span style="color: blue;">这是另一个行内元素。</span><!-- 行内元素 -->
        <span>我是第一部分。</span><span>这是第二部分。</span><span>一行可以有很多个</span>

        <!-- 列表元素 -->
        <ol>    
            <!-- 有序列表 -->
            <li>第一项</li><!-- 列表项 -->
            <li>第二项</li>
            <li>第三项</li>
        </ol>
        <ul>    
            <!-- 无序列表 -->
            <li>第一项</li>
            <li>第二项</li>
            <li>第三项</li>
        </ul>

        <!-- 表格元素 -->
        <table border="3"><!-- border属性设置边框 -->
            <!-- 表头 -->
            <thead>
                <tr><!-- 表格行 -->
                    <th>表头1</th><!-- 表头单元格 -->
                    <th>表头2</th>
                </tr>
            </thead>
            <!-- 表体 -->
            <tbody>
                <tr><!-- 表格行 -->
                    <td>单元格1</td><!-- 表格单元格 -->
                    <td>单元格2</td>
                </tr>
                <tr>
                    <td>单元格3</td>
                    <td>单元格4</td>
                </tr>
        </table>

        <!-- 属性 -->
        <p class="content">这是一个段落，带有class属性。</p><!-- 带有class属性的元素 -->
        <p id="unique">这是一个段落，带有id属性。</p><!-- 带有id属性的元素 -->
        <p style="color: red;">这是一个段落，带有style属性。</p><!-- 带有style属性的元素 -->
        <p title="这是一个提示">这是一个段落，带有title属性。</p><!-- 带有title属性的元素 -->
        
    </body>
</html>
